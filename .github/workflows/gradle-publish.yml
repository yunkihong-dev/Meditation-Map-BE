# Spring Boot + Docker Compose 배포
# - CI: docker compose build app 로 Dockerfile 검증 (실제 빌드는 멀티스테이지 Dockerfile 내부 Gradle 이 수행)
# - CD: GitHub Secrets 로 .env 작성 → 서버에 같이 업로드 후 docker compose up
# - 진입점은 nginx(:80) 리버스 프록시: /image/ → MinIO(내부 9000), 그 외 → app. nginx/default.conf 가 deploy.tgz 에 포함됨.
#   MINIO_PUBLIC_BASE_URL 은 선택: 비우면 앱이 요청 호스트 기준 /image 로 자동 생성(API 와 동일 도메인).
#   별도 미디어 도메인/CDN(예: https://media.도메인) 일 때만 지정. 포트 9000 외부 노출 불필요.
# Secrets: SSH_KEY, SERVER_HOST, SERVER_PORT, SERVER_USER, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#          KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET, NAVER_CLIENT_ID, NAVER_CLIENT_SECRET,
#          OAUTH2_FRONTEND_CALLBACK_URL, MINIO_PUBLIC_BASE_URL, JWT_SECRET (권장), APP_CORS_ALLOWED_ORIGINS (선택),
#          PHONE_SMS_PROVIDER, PHONE_OTP_HMAC_SECRET (선택 · 비우면 JWT_SECRET 대체),
#          NAVER_SMS_ID, NAVER_SMS_PHONE_NUMBER, NAVER_ACCESS_KEY, NAVER_SECRET_KEY (네이버 SMS)
# 선택: SERVER_DEPLOY_PATH (비우면 원격에서 ~/meditation-map-be 사용)
#
# 기본은 전체 스택 up. app 만: ssh 안 마지막을 docker compose up -d --build --force-recreate app

name: Spring Boot CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # docker-compose.yml 의 env_file: .env 는 파일이 없으면 build 단계에서도
      # "env file .env not found" 로 실패합니다. .env 는 .gitignore 대상이라
      # 러너 체크아웃에는 없으므로 CI 검증용 빈 .env 를 만들어 둡니다.
      # (compose 변수는 모두 ${VAR:-default} 기본값이 있어 빈 파일로 충분, 실제 값은 서버에서 주입)
      - name: Prepare placeholder .env for build validation
        run: touch .env

      - name: Validate Docker image (app service)
        run: docker compose build app

      - name: Create deployment archive
        run: |
          # 아카이브를 압축 대상(.) 밖($RUNNER_TEMP)에 쓴다.
          # 같은 디렉터리에 만들면 tar 가 자기 출력 파일 때문에
          # "tar: .: file changed as we read it" (exit 1) 로 실패한다.
          tar \
            --exclude='./.git' \
            --exclude='./.gradle' \
            --exclude='./build' \
            --exclude='./bin' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            -czf "$RUNNER_TEMP/deploy.tgz" .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} \
            -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Write server .env from GitHub Secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OAUTH2_FRONTEND_CALLBACK_URL: ${{ secrets.OAUTH2_FRONTEND_CALLBACK_URL }}
          MINIO_PUBLIC_BASE_URL: ${{ secrets.MINIO_PUBLIC_BASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
          PHONE_SMS_PROVIDER: ${{ secrets.PHONE_SMS_PROVIDER }}
          PHONE_OTP_HMAC_SECRET: ${{ secrets.PHONE_OTP_HMAC_SECRET }}
          NAVER_SMS_ID: ${{ secrets.NAVER_SMS_ID }}
          NAVER_SMS_PHONE_NUMBER: ${{ secrets.NAVER_SMS_PHONE_NUMBER }}
          NAVER_ACCESS_KEY: ${{ secrets.NAVER_ACCESS_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
        run: |
          umask 077
          printf '%s\n' \
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
            "KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}" \
            "KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}" \
            "NAVER_CLIENT_ID=${NAVER_CLIENT_ID}" \
            "NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}" \
            "OAUTH2_FRONTEND_CALLBACK_URL=${OAUTH2_FRONTEND_CALLBACK_URL}" \
            "MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}" \
            "PHONE_SMS_PROVIDER=${PHONE_SMS_PROVIDER}" \
            "PHONE_OTP_HMAC_SECRET=${PHONE_OTP_HMAC_SECRET}" \
            "NAVER_SMS_ID=${NAVER_SMS_ID}" \
            "NAVER_SMS_PHONE_NUMBER=${NAVER_SMS_PHONE_NUMBER}" \
            "NAVER_ACCESS_KEY=${NAVER_ACCESS_KEY}" \
            "NAVER_SECRET_KEY=${NAVER_SECRET_KEY}" > server.env

      - name: Upload bundle and deploy with Docker Compose
        run: |
          set -euo pipefail
          scp -P ${{ secrets.SERVER_PORT }} \
            "$RUNNER_TEMP/deploy.tgz" \
            server.env \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "set -euo pipefail; \
            DEPLOY_PATH='${{ secrets.SERVER_DEPLOY_PATH }}'; \
            if [ -z \"\$DEPLOY_PATH\" ]; then DEPLOY_PATH=\"\$HOME/meditation-map-be\"; fi; \
            mkdir -p \"\$DEPLOY_PATH\"; \
            tar -xzf /tmp/deploy.tgz -C \"\$DEPLOY_PATH\"; \
            mv -f /tmp/server.env \"\$DEPLOY_PATH/.env\"; \
            chmod 600 \"\$DEPLOY_PATH/.env\"; \
            rm -f /tmp/deploy.tgz /tmp/server.env; \
            chmod +x \"\$DEPLOY_PATH/gradlew\" 2>/dev/null || true; \
            cd \"\$DEPLOY_PATH\"; \
            docker compose up -d --build"
