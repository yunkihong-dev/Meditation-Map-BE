# Spring Boot + Docker Compose 배포
# - CI: Gradle 빌드 + docker compose build app 로 Dockerfile 검증
# - CD: GitHub Secrets 로 .env 작성 → 서버에 같이 업로드 후 docker compose up
# Secrets: SSH_KEY, SERVER_HOST, SERVER_PORT, SERVER_USER, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#          KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET, MINIO_PUBLIC_BASE_URL, JWT_SECRET (권장), APP_CORS_ALLOWED_ORIGINS (선택),
#          PHONE_SMS_PROVIDER, PHONE_OTP_HMAC_SECRET, PHONE_SNS_REGION, PHONE_HTTP_SMS_URL,
#          PHONE_HTTP_SMS_BEARER_TOKEN (선택 · 회원가입 문자)
# 선택: SERVER_DEPLOY_PATH (비우면 원격에서 ~/meditation-map-be 사용)
#
# 기본은 전체 스택 up. app 만: ssh 안 마지막을 docker compose up -d --build --force-recreate app

name: Spring Boot CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker image (app service)
        run: docker compose build app

      - name: Create deployment archive
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./.gradle' \
            --exclude='./build' \
            --exclude='./bin' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            -czf deploy.tgz .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} \
            -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Write server .env from GitHub Secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          MINIO_PUBLIC_BASE_URL: ${{ secrets.MINIO_PUBLIC_BASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
          PHONE_SMS_PROVIDER: ${{ secrets.PHONE_SMS_PROVIDER }}
          PHONE_OTP_HMAC_SECRET: ${{ secrets.PHONE_OTP_HMAC_SECRET }}
          PHONE_SNS_REGION: ${{ secrets.PHONE_SNS_REGION }}
          PHONE_HTTP_SMS_URL: ${{ secrets.PHONE_HTTP_SMS_URL }}
          PHONE_HTTP_SMS_BEARER_TOKEN: ${{ secrets.PHONE_HTTP_SMS_BEARER_TOKEN }}
        run: |
          umask 077
          printf '%s\n' \
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
            "KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}" \
            "KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}" \
            "MINIO_PUBLIC_BASE_URL=${MINIO_PUBLIC_BASE_URL}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}" \
            "PHONE_SMS_PROVIDER=${PHONE_SMS_PROVIDER}" \
            "PHONE_OTP_HMAC_SECRET=${PHONE_OTP_HMAC_SECRET}" \
            "PHONE_SNS_REGION=${PHONE_SNS_REGION}" \
            "PHONE_HTTP_SMS_URL=${PHONE_HTTP_SMS_URL}" \
            "PHONE_HTTP_SMS_BEARER_TOKEN=${PHONE_HTTP_SMS_BEARER_TOKEN}" > server.env

      - name: Upload bundle and deploy with Docker Compose
        run: |
          set -euo pipefail
          scp -P ${{ secrets.SERVER_PORT }} \
            deploy.tgz \
            server.env \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "set -euo pipefail; \
            DEPLOY_PATH='${{ secrets.SERVER_DEPLOY_PATH }}'; \
            if [ -z \"\$DEPLOY_PATH\" ]; then DEPLOY_PATH=\"\$HOME/meditation-map-be\"; fi; \
            mkdir -p \"\$DEPLOY_PATH\"; \
            tar -xzf /tmp/deploy.tgz -C \"\$DEPLOY_PATH\"; \
            mv -f /tmp/server.env \"\$DEPLOY_PATH/.env\"; \
            chmod 600 \"\$DEPLOY_PATH/.env\"; \
            rm -f /tmp/deploy.tgz /tmp/server.env; \
            chmod +x \"\$DEPLOY_PATH/gradlew\" 2>/dev/null || true; \
            cd \"\$DEPLOY_PATH\"; \
            docker compose up -d --build"
