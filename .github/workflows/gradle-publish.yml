name: Spring Boot CI-CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 저장소 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradlew 실행 권한 부여
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # Spring Boot 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # SSH 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -p ${{ secrets.SERVER_PORT }} \
            -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # Mac 서버에 JAR 업로드
      - name: Upload JAR to Mac Server
        run: |
          scp -P ${{ secrets.SERVER_PORT }} \
            build/libs/*.jar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/Users/${{ secrets.SERVER_USER }}/app/app.jar

      # 애플리케이션 재배포
      - name: Deploy Application
        run: |
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

              pkill -f 'app.jar' || true

              nohup java -jar /Users/${{ secrets.SERVER_USER }}/app/app.jar \
                > /Users/${{ secrets.SERVER_USER }}/app/app.log 2>&1 &

          EOF
