## meditation-map 리버스 프록시
## :80 으로 들어온 트래픽을 경로별로 분기한다.
##   /image/  → MinIO(내부 9000)  : 업로드된 이미지 객체 공개 서빙
##   그 외    → app(백엔드 :80)
## 이 구성 덕분에 MinIO 9000 포트를 외부로 열지 않아도 된다.
##
## 업스트림(app/minio)을 변수+resolver 로 런타임에 해석한다.
## 배포 시 app 컨테이너가 재생성되며 IP 가 바뀌는데, 정적 proxy_pass 는 시작 시 IP 를
## 캐시해 배포 후 502 가 난다. Docker 내장 DNS(127.0.0.11)로 매번 다시 해석해 이를 방지.

server {
    listen 80;
    server_name _;

    # 회원/명상 이미지 업로드(백엔드 multipart 경유)가 nginx 기본 1m 제한에 걸리지 않도록 상향
    client_max_body_size 20m;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # 배포 확인용 정적 테스트 페이지 (백엔드/인증 안 거침). http://<host>/test
    location = /test {
        alias /usr/share/nginx/html/test.html;
        default_type text/html;
    }

    # 이미지: /image/<bucket>/<key> → minio:9000/<bucket>/<key> (프리픽스 /image/ 제거)
    location ~ ^/image/(.*)$ {
        set $minio_upstream minio:9000;
        proxy_pass http://$minio_upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 그 외 전부 → 백엔드 앱
    location / {
        set $app_upstream app:80;
        proxy_pass http://$app_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
