spring:
  datasource:
    url: jdbc:mysql://mysql:3306/meditation?characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: meditation
    password: meditation

  data:
    redis:
      host: redis
      port: 6379

  # compose에서 GOOGLE_/KAKAO_ 미지정 시에도 검증 통과(실제 로그인은 키 주입 필요)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:docker-dev-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:docker-dev-placeholder}
          kakao:
            client-id: ${KAKAO_CLIENT_ID:docker-dev-placeholder}
            client-secret: ${KAKAO_CLIENT_SECRET:docker-dev-placeholder}
          naver:
            client-id: ${NAVER_CLIENT_ID:docker-dev-placeholder}
            client-secret: ${NAVER_CLIENT_SECRET:docker-dev-placeholder}

management:
  endpoint:
    health:
      show-details: always

app:
  jwt:
    # 운영은 HTTPS(Cloudflare) → 인증 쿠키 Secure. 프론트가 다른 도메인이어도 동작하도록 SameSite=None.
    # (동일 도메인만 쓸 거면 JWT_COOKIE_SAME_SITE=Lax 로 덮으면 됨)
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:None}

  storage:
    minio:
      enabled: ${MINIO_ENABLED:true}
      endpoint: ${MINIO_ENDPOINT:http://minio:9000}
      access-key: ${MINIO_ACCESS_KEY:minio}
      secret-key: ${MINIO_SECRET_KEY:minio12345}
      bucket: ${MINIO_BUCKET:meditation-media}
      # 비우면 요청 호스트 기준 /image 로 자동 생성(동일 도메인). 별도 미디어 도메인/CDN 일 때만 지정.
      public-base-url: ${MINIO_PUBLIC_BASE_URL:}
